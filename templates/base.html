<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{{ config.description }}">
  <meta property="og:title" content="{{ config.title }}">
  <meta property="og:description" content="{{ config.description }}">
  <meta property="og:image" content="https://github.com/skorokithakis/stavrobot/raw/master/misc/stavrobot.jpg">
  <meta property="og:url" content="{{ config.base_url }}">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ config.title }}">
  <meta name="twitter:description" content="{{ config.description }}">
  <meta name="twitter:image" content="https://github.com/skorokithakis/stavrobot/raw/master/misc/stavrobot.jpg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav class="site-nav">
    <a href="/" class="nav-title mono">Stavrobot</a>
    <div class="nav-links">
      <a href="/#features" class="mono">Features</a>
      <a href="/#security" class="mono">Security</a>
      <a href="/#quickstart" class="mono">Quickstart</a>
      <a href="/skills/" class="mono">Skills</a>
      <a href="/plugins/" class="mono">Plugins</a>
    </div>
    <a href="https://github.com/skorokithakis/stavrobot" class="github-button" target="_blank" rel="noopener">
      <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
      <svg class="github-star-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .587l3.668 7.431L24 9.168l-6 5.85 1.416 8.256L12 19.187l-7.416 4.087L6 15.018 0 9.168l8.332-1.15z"/></svg>
      <span id="star-count"></span>
    </a>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <script>
    fetch("https://api.github.com/repos/skorokithakis/stavrobot")
      .then(r => r.json())
      .then(d => {
        const el = document.getElementById("star-count");
        if (el && d.stargazers_count != null) {
          const n = d.stargazers_count;
          el.textContent = n >= 1000 ? (n / 1000).toFixed(1).replace(/\.0$/, "") + "k" : n;
        }
      })
      .catch(() => {});
  </script>
  <footer class="site-footer mono">
    Stavrobot — A personal AI assistant
  </footer>
</body>
</html>
