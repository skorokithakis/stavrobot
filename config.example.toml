# Valid providers: amazon-bedrock, anthropic, azure-openai-responses, cerebras,
# github-copilot, google, google-antigravity, google-gemini-cli, google-vertex,
# groq, huggingface, kimi-coding, minimax, minimax-cn, mistral, openai,
# openai-codex, opencode, opencode-go, openrouter, vercel-ai-gateway, xai, zai.
provider = "anthropic"
model = "claude-sonnet-4-20250514"

# To use a custom OpenAI-compatible endpoint instead:
# provider = "openai-compatible"
# model = "claude-sonnet-4-6"
# baseUrl = "http://localhost:8317/v1"
# apiKey = "your-api-key"
# contextWindow = 200000    # optional, auto-detected for known models
# maxTokens = 64000         # optional, auto-detected for known models

# Password for HTTP Basic Auth. All endpoints except webhooks require this.
# Change this to something secure. If removed or commented out, all endpoints
# are open to the world.
password = "change-me"

# Authentication: use exactly one of apiKey or authFile.
# apiKey: a static Anthropic API key.
# authFile: path to an auth.json with OAuth credentials (for Claude Pro/Max
#   subscriptions). Generate it by running `npx @mariozechner/pi-coding-agent`,
#   then using the /login command and choosing "Anthropic".
# apiKey = "your-api-key-here"
authFile = "/app/data/auth.json"


# The public HTTPS URL where this server is reachable (no trailing slash).
publicHostname = "https://example.com"

# Estimated token count at which conversation history is compacted into a summary.
# Uses a character/3 heuristic. Increase to keep more history in context; decrease
# to compact sooner and reduce API costs.
# compactionTokenThreshold = 80000

# Optional additional instructions appended to the base system prompt.
# The base prompt is in system-prompt.txt and always applies.
customPrompt = """
I prefer a dry wit and an even tone. Avoid excessive emojis and cheerful language. Use
normal dashes rather than en- or em-dashes. Don't end messages with a full stop, it's
too formal.
"""

# The owner of this bot. Used to seed the owner interlocutor record on startup.
# name is required. signal, telegram, whatsapp, and email are the owner's personal
# numbers/IDs/addresses — the ones the owner messages the bot from (not the bot's
# own numbers). Include whichever channels the owner uses.
[owner]
name = "Stavros"
# signal = "+1234567890"
# telegram = "123456789"
# whatsapp = "+1234567890"
# email = "owner@example.com"          # specific address
# email = "*@example.com"              # any address at this domain
# email = "myuser+*@gmail.com"         # any plus-tag for this user

# Signal integration. account is the bot's phone number (registered with
# signal-cli — must be a separate number from the owner's).
# The allowlist of numbers permitted to message the agent is managed via the
# /settings web UI and stored in allowlist.json (not in this file).
[signal]
account = "+1234567890"

# Telegram integration. Create a bot via @BotFather on Telegram to get a token.
# To find your chat ID, message @userinfobot on Telegram.
# The webhook is registered at <publicHostname>/telegram/webhook on startup.
# publicHostname (top-level) must be set when using Telegram.
# The allowlist of chat IDs permitted to message the agent is managed via the
# /settings web UI and stored in allowlist.json (not in this file).
[telegram]
botToken = "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"

# WhatsApp integration.
# Uncomment the section header to enable. On first start, a QR code will appear
# in the app logs — scan it with WhatsApp to link as a companion device.
# Note: uses an unofficial library. Risk of account ban or protocol breakage.
# The allowlist of numbers permitted to message the agent is managed via the
# /settings web UI and stored in allowlist.json (not in this file).
# [whatsapp]

# Email integration. Inbound email arrives via a Cloudflare Email Worker that
# posts to /email/webhook. Outbound email is sent via SMTP.
#
# Setup:
#   1. Add this section to config.toml with your SMTP credentials and a random
#      webhookSecret (e.g. `openssl rand -hex 32`).
#   2. Deploy the Cloudflare Email Worker below to your Cloudflare account.
#   3. In the worker, set the environment variables WEBHOOK_URL and WEBHOOK_SECRET
#      (via `wrangler secret put` or the Cloudflare dashboard):
#        WEBHOOK_URL    = https://<publicHostname>/email/webhook
#        WEBHOOK_SECRET = <the same value as webhookSecret below>
#   4. In Cloudflare Email Routing, add a routing rule that forwards inbound mail
#      to the worker.
#   5. Add allowed sender addresses via the /settings web UI. The local part
#      (before @) supports * as a glob wildcard, e.g. *@example.com or
#      myuser+*@gmail.com.
#
# Cloudflare Email Worker code (create a new Worker and paste this):
#
#   export default {
#     async email(message, env, ctx) {
#       const rawEmail = await new Response(message.raw).text();
#       const response = await fetch(env.WEBHOOK_URL, {
#         method: "POST",
#         headers: {
#           "Content-Type": "application/json",
#           "Authorization": "Bearer " + env.WEBHOOK_SECRET,
#         },
#         body: JSON.stringify({
#           from: message.from,
#           to: message.to,
#           raw: rawEmail,
#         }),
#       });
#       if (!response.ok) {
#         message.setReject(`Webhook returned ${response.status}`);
#       }
#     },
#   };
#
# [email]
# Required for inbound email (webhook):
# webhookSecret = "your-random-secret"
#
# Required for outbound email (SMTP) — omit these if you only need inbound:
# smtpHost = "smtp.example.com"
# smtpPort = 587
# smtpUser = "bot@example.com"
# smtpPassword = "your-smtp-password"
# fromAddress = "bot@example.com"

# Enables the self-programming coder agent. Uses Claude Code headless, which
# requires subscription auth (see README). The model must be a Claude Code
# alias: "sonnet", "opus", or "haiku".
[coder]
model = "sonnet"

# Optional OpenAI embeddings support. When present, the bot generates vector
# embeddings for semantic search. This improves recall (finding relevant
# messages that don't share exact keywords) at the cost of ~300ms extra latency
# per search. Without embeddings, search falls back to full-text only.
# [embeddings]
# apiKey = "your-openai-api-key-here"

